<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メールアドレス確認 - Bluegrass GONG</title>
</head>
<body style="margin:0;padding:0;background-color:#fafaf9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#ffffff;border-radius:12px;border:1px solid #e7e5e4;overflow:hidden;">
          <tr>
            <td style="background-color:#b45309;padding:24px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:20px;font-weight:bold;">Bluegrass GONG</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 24px;">
              <p style="margin:0 0 16px;color:#1c1917;font-size:16px;line-height:1.6;">
                Bluegrass GONG へのご登録ありがとうございます。
              </p>
              <p style="margin:0 0 24px;color:#44403c;font-size:14px;line-height:1.6;">
                以下のボタンをクリックして、メールアドレスの確認を完了してください。
              </p>
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;padding:12px 32px;background-color:#b45309;color:#ffffff;text-decoration:none;border-radius:8px;font-size:14px;font-weight:bold;">
                      メールアドレスを確認する
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:24px 0 0;color:#78716c;font-size:12px;line-height:1.6;">
                このメールに心当たりがない場合は無視してください。リンクは24時間有効です。
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 24px;background-color:#fafaf9;border-top:1px solid #e7e5e4;text-align:center;">
              <p style="margin:0;color:#a8a29e;font-size:11px;">
                Bluegrass GONG - ブルーグラスジャムセッションの共通曲マッチング
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
